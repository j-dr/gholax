theory:
  LinearPowerSpectrum:
    use_emulator: False
    use_boltzmann: True
    kmax: 10

  ExpansionHistory:
    use_emulator: False
    use_boltzmann: True
    emulator_file_names: 
      chi_z: aemulus_nu_tier1_cosmo_only_heft_chiz_emu
      e_z: aemulus_nu_tier1_cosmo_only_heft_ez_emu

  LinearGrowth:
    use_emulator: False
    use_boltzmann: True

  RealSpaceMatterPowerSpectrum:
    use_emulator: True
#    use_boltzmann: True
    emulator_file_names: emu_config_dst_irresum.yaml

  RealSpaceBiasedTracerSpectra:
    bias_model: cleft #as opposed to CLEFT/linear bias
    use_emulator: False
    emulator_file_names: emu_config_dst_irresum.yaml

  RealSpaceBiasExpansion:
    baryon_z_evolution_model : spline
    p_mm_ct_order : 1
    p_mm_ct_pade: True
    spline_N: 2
    spline_Delta: 2.0
    bias_model: cleft
    scale_by_s8z: True
  
  DensityShapeIA:
    use_emulator: False
    emulator_file_names: 'emu_p_density_shape.yaml'

  ShapeShapeIA:
    use_emulator: False
    emulator_file_names: 
     - emu_p0_shape_shape.yaml
     - emu_p1_shape_shape.yaml 
     - emu_p2_shape_shape.yaml

  RealSpaceIAExpansion:
    z_evolution_model : spline
    spline_N: 3
    spline_Delta: 0.6
    scale_by_s8z: True
    include_magnification_x_ia: True
    no_ia: False
 
projection:
  k_cutoff: 1.0
  LensingCounterterm:
    lensing_counterterm_order: 0
    mean_model: dmo

  Limber:
    k_cutoff: None

sampler:
  {'NUTS': {'n_steps_warmup': 500, 'n_incr': 50, 'target_r_minus_one': 0.1, 'random_start': False, 'minimize_and_sample': True, 'n_steps_min': 2000}}

emulate:
  likelihood: 
    Nx2PTAngularPowerSpectrum: ['p_ij_real_space_bias_grid', 'p_mij_real_space_shape_shape_grid', 'p_ij_real_space_density_shape_grid', 'sigma8_z']
  design_scheme: 'qrs'
  nend: 32768
  output_filename: /pscratch/sd/j/jderose/gholax/training/rs_bias_ia_data_w0wa.h5  

